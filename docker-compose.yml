version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booktracker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/booktracker
      JWT_SECRET: secret-key

volumes:
  postgres_data: